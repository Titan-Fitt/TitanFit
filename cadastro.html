<img src="fotos/logo2.png" alt="Logo Titan Fit">

<h1>Cadastro</h1>

<form>
    <label for="nome">Nome completo</label>
    <input type="text" id="nome" name="nome" placeholder="fulano">


    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="fulano@gmail.com">

    <label for="usuario">Nome do usuário</label>
    <input type="text" id="usuario" name="usuario" placeholder="fulano123">

    <label for="senha">Criar senha</label>
    <input type="password" id="senha" name="senha" placeholder="***********">

    <label for="confirmar-senha">Confirmar-senha</label>
    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="***********">

    <button type="submit">Cadastrar</button>
    </form>
