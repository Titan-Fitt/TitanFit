<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Login</title>
</head>
<body>
<div class="modal">
    <button class="fechar">X</button>

    <figure>
        <img src="fotos/logo2.png" alt="">
    </figure>

    <h1>login</h1>
    <p>Entre na sua conta</p>

    <form>
        <label for="email">E-mail ou nome de usuario</label>
        <input type="text" id="email" placeholder="">

        <button type="submit">continuar</button>

        <span class="divisor">ou</span>

        <button type="button" class="btn-social">
            <img src="fotos/Logo-google-icon.png" alt="">
            continuar com Google
        </button>

        <button type="button" class="btn-social">
            <img src="fotos/apple-logo-icon.png" alt="">
            continuar com Apple
        </button>
    </form>
<div class="cadastro-texto">
    <p>Não tem conta?</p>
    <a href="cadastro.html">CADASTRA-SE</a>
</div>

</div>

    
</body>
</html>
